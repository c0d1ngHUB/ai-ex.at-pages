<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI-ex – lokale KI-Automation</title>
  <desc id="desc">Dunkle AI-ex Social Preview Grafik für lokale KI-Automation im D-A-CH-Raum.</desc>
  <defs>
    <radialGradient id="cyan" cx="18%" cy="12%" r="70%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="84%" cy="8%" r="68%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#050816" stop-opacity="0"/>
